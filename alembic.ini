[alembic]
script_location = alembic
# Points to the real remote DB — same as DATABASE_URL in .env
sqlalchemy.url = mysql+pymysql://AF-tst-admin:Password%40123@191.101.80.174:3306/AF-tst-db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
